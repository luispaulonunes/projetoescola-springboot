<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Escola - Gerenciamento de Usuários</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🎓 Projeto Escola</h1>
        <p>Sistema de Gerenciamento de Usuários</p>
    </header>

    <main>

        <section class="card">
            <h2>Cadastrar Usuário</h2>

            <form id="formCadastro">
                <input type="text" id="nomeCadastro" placeholder="Nome Completo" required>
                <input type="text" id="usuarioCadastro" placeholder="Usuário" required>
                <input type="email" id="emailCadastro" placeholder="E-mail" required>
                <input type="password" id="senhaCadastro" placeholder="Senha" required>
                <input type="text" id="telefoneCadastro" placeholder="Telefone" required>

                <button type="submit">Cadastrar</button>
            </form>
        </section>

        <section class="card">
            <h2>Lista de Usuários</h2>

            <button id="btnListar">
                Carregar Usuários
            </button>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Email</th>
                    </tr>
                </thead>

                <tbody id="listaUsuarios">
                </tbody>
            </table>
        </section>

        <section class="card">
            <h2>Atualizar Usuário</h2>

            <form id="formAtualizar">
                <input type="number" id="idAtualizar" placeholder="ID" required>
                <input type="text" id="nomeAtualizar" placeholder="Nome Completo" required>
                <input type="text" id="usuarioAtualizar" placeholder="Usuário" required>
                <input type="email" id="emailAtualizar" placeholder="E-mail" required>
                <input type="password" id="senhaAtualizar" placeholder="Senha" required>
                <input type="text" id="telefoneAtualizar" placeholder="Telefone" required>

                <button type="submit">Atualizar</button>
            </form>
        </section>

        <section class="card">
            <h2>Excluir Usuário</h2>

            <form id="formExcluir">
                <input type="number" id="idExcluir" placeholder="ID do Usuário" required>

                <button type="submit" class="danger">
                    Excluir
                </button>
            </form>
        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
